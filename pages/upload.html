<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>发布视频 - Global Shorts</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></head><body><div class="upload-container"><div class="upload-header"><button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button><div class="header-actions"><button class="draft-btn" id="saveDraftBtn"><i class="fas fa-folder-open"></i> <span>存草稿</span></button> <button class="publish-btn" id="publishBtn" disabled="disabled"><i class="fas fa-paper-plane"></i> <span>发布</span></button></div></div><div class="video-preview-area" id="videoPreviewArea"><div class="video-placeholder" id="videoPlaceholder"><i class="fas fa-cloud-upload-alt"></i><p>点击选择视频</p><span class="video-tip">支持 MP4、MOV，最长60秒</span></div><video class="video-preview" id="videoPreview" controls style="display:none;"></video><button class="rechoose-video-btn" id="rechooseVideoBtn" style="display:none;"><i class="fas fa-exchange-alt"></i> 重新选择</button></div><div class="select-video-section"><input type="file" id="videoInput" accept="video/*" capture="camera" style="display:none;"> <button class="select-video-btn" id="selectVideoBtn"><i class="fas fa-plus-circle"></i> 选择视频</button></div><div class="form-section" style="display:none;" id="formSection"><div class="form-item cover-item"><div class="form-label"><i class="fas fa-image"></i> <span>封面设置</span> <span class="optional">(选填)</span></div><div class="cover-area"><div class="cover-preview" id="coverPreview" style="background-image: url('');"><div class="cover-overlay" id="coverOverlay"><i class="fas fa-camera"></i> <span>更换封面</span></div></div><div class="cover-options"><button class="cover-option-btn" id="autoCoverBtn"><i class="fas fa-magic"></i> <span>AI推荐</span></button> <button class="cover-option-btn" id="selectCoverBtn"><i class="fas fa-images"></i> <span>从相册</span></button></div></div><input type="file" id="coverInput" accept="image/*" style="display:none;"></div><div class="form-item"><div class="form-label"><i class="fas fa-heading"></i> <span>标题</span> <span class="required">*</span></div><div class="input-wrapper"><input class="form-input" id="titleInput" placeholder="请输入视频标题" maxlength="30"><div class="input-actions"><button class="ai-btn" id="aiTitleBtn" title="AI智能生成标题"><i class="fas fa-robot"></i></button> <span class="char-count" id="titleCount">0/30</span></div></div><div class="ai-suggestions" id="aiTitleSuggestions" style="display:none;"><div class="suggestions-header"><i class="fas fa-robot"></i> <span>AI 推荐标题</span> <button class="close-suggestions"><i class="fas fa-times"></i></button></div><div class="suggestions-list" id="titleSuggestionsList"></div></div></div><div class="form-item"><div class="form-label"><i class="fas fa-align-left"></i> <span>简介</span> <span class="optional">(选填)</span></div><div class="input-wrapper"><textarea class="form-textarea" id="descInput" rows="3" placeholder="介绍一下你的视频吧" maxlength="100"></textarea><div class="char-count" id="descCount">0/100</div></div></div><div class="form-item"><div class="form-label"><i class="fas fa-tags"></i> <span>分类</span> <span class="required">*</span></div><div class="category-selector" id="categorySelector"><div class="category-placeholder" id="categoryPlaceholder">请选择分类</div><div class="category-options" id="categoryOptions"></div></div></div><div class="form-item"><div class="form-label"><i class="fas fa-hashtag"></i> <span>标签</span> <span class="optional">(选填，最多5个)</span></div><div class="tags-area"><div class="tags-list" id="tagsList"></div><div class="tag-input-wrapper"><input class="tag-input" id="tagInput" placeholder="输入标签后按回车" maxlength="8"> <button class="ai-tag-btn" id="aiTagBtn" title="AI推荐标签"><i class="fas fa-robot"></i></button></div><div class="ai-tag-suggestions" id="aiTagSuggestions" style="display:none;"><div class="suggestions-list" id="tagSuggestionsList"></div></div></div></div><div class="form-item"><div class="form-label"><i class="fas fa-lock"></i> <span>可见性</span></div><div class="visibility-options"><label class="visibility-option"><input type="radio" name="visibility" value="public" checked="checked"> <span><i class="fas fa-globe"></i> 公开</span></label> <label class="visibility-option"><input type="radio" name="visibility" value="fans"> <span><i class="fas fa-users"></i> 仅粉丝可见</span></label> <label class="visibility-option"><input type="radio" name="visibility" value="private"> <span><i class="fas fa-lock"></i> 仅自己可见</span></label></div></div><div class="form-item"><label class="agreement-checkbox"><input type="checkbox" id="agreementCheckbox"> <span>我已阅读并同意 <a href="#" id="agreementLink">《用户协议》</a> 和 <a href="#" id="privacyLink">《隐私政策》</a></span></label></div></div><div class="upload-progress" id="uploadProgress" style="display:none;"><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">准备上传...</div></div></div><div class="loading-overlay" id="loadingOverlay" style="display:none;"><div class="loading-spinner"></div><p>处理中...</p></div><script type="module" src="/scripts/pages/upload.js"></script><script defer="defer" src="/scripts/main.5761f584ebfc900d3c25.js"></script><script defer="defer" src="/scripts/upload.fadd54e69434b2a9889d.js"></script></body></html>
