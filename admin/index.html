<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - Global Shorts 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-common.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="admin-header">
    <div class="header-left">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="logo">
            <i class="fas fa-globe-americas"></i>
            <span>Global Shorts 后台</span>
        </div>
    </div>
    <div class="header-right">
        <div class="language-switcher" id="languageSwitcher">
            <i class="fas fa-language"></i>
            <span id="currentLanguage">中文</span>
            <i class="fas fa-chevron-down"></i>
        </div>
        
        <!-- 用户菜单 -->
        <div class="admin-user" id="userMenuTrigger" style="position:relative; cursor:pointer;">
            <div class="user-avatar" id="userAvatar">AD</div>
            <div>
                <div id="adminName">管理员</div>
                <div style="font-size:12px;color:var(--gray)" id="adminRole">超级管理员</div>
            </div>
        </div>
    </div>
</header>

<!-- 用户下拉菜单（放在header外面，但紧随其后） -->
<div class="user-dropdown" id="userDropdown" style="display:none; position:absolute; top:60px; right:20px; background:white; border-radius:8px; box-shadow:0 8px 16px rgba(0,0,0,0.1); z-index:1000; min-width:180px;">
    <a href="/admin/profile.html" style="display:block; padding:12px 16px; color:rgba(0,0,0,0.85); text-decoration:none;">
        <i class="fas fa-user" style="margin-right:8px;"></i>个人资料
    </a>
    <a href="/admin/settings.html" style="display:block; padding:12px 16px; color:rgba(0,0,0,0.85); text-decoration:none;">
        <i class="fas fa-cog" style="margin-right:8px;"></i>账户设置
    </a>
    <a href="/admin/change-password.html" style="display:block; padding:12px 16px; color:rgba(0,0,0,0.85); text-decoration:none;">
        <i class="fas fa-key" style="margin-right:8px;"></i>修改密码
    </a>
    <div style="height:1px; background:var(--border); margin:4px 0;"></div>
    <a href="#" id="logoutBtn" style="display:block; padding:12px 16px; color:#f5222d; text-decoration:none;">
        <i class="fas fa-sign-out-alt" style="margin-right:8px;"></i>退出登录
    </a>
</div>

    <div class="admin-container">
        <!-- 侧边栏 (菜单激活: 仪表盘) -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-menu">
                <div class="menu-item active" data-page="dashboard"><i class="fas fa-tachometer-alt"></i><span>仪表盘</span></div>
                
                <!-- 用户管理 -->
                <div class="menu-item has-submenu" id="userManagementMenu">
                    <div><i class="fas fa-users"></i><span>用户管理</span></div>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="submenu" id="userSubmenu">
                    <div class="submenu-item" data-page="users">用户列表</div>
                    <div class="submenu-item" data-page="vipUsers">VIP用户</div>
                    <div class="submenu-item" data-page="userAnalysis">用户分析</div>
                </div>
                
                <!-- 内容管理 -->
                <div class="menu-item has-submenu" id="contentManagementMenu">
                    <div><i class="fas fa-film"></i><span>内容管理</span></div>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="submenu" id="contentSubmenu">
                    <div class="submenu-item" data-page="dramas">剧集管理</div>
                    <div class="submenu-item" data-page="episodes">分集管理</div>
                    <div class="submenu-item" data-page="batchUpload">批量上传</div>
                    <div class="submenu-item" data-page="categories">分类管理</div>
                </div>
                
                <!-- VIP套餐 -->
                <div class="menu-item" data-page="vipPlans"><i class="fas fa-crown"></i><span>VIP套餐管理</span></div>
                <div class="menu-item" data-page="coinPackages"><i class="fas fa-coins"></i><span>金币套餐</span></div>
                <div class="menu-item" data-page="adPositions"><i class="fas fa-ad"></i><span>广告位管理</span></div>
                <div class="menu-item" data-page="paymentInterface"><i class="fas fa-credit-card"></i><span>支付接口</span></div>
                <div class="menu-item" data-page="regionLanguage"><i class="fas fa-language"></i><span>区域语言</span></div>
                <div class="menu-item" data-page="adminManage"><i class="fas fa-user-shield"></i><span>管理员管理</span></div>
                <div class="menu-item" data-page="systemSettings"><i class="fas fa-cog"></i><span>系统设置</span></div>
                <div class="menu-item" data-page="frontendManage"><i class="fas fa-paint-brush"></i><span>前台管理</span></div>
            </div>
        </aside>

        <main class="admin-main">
            <div class="page-content active" id="dashboardPage">
                <div class="page-header">
                    <h1 class="page-title">仪表盘</h1>
                    <p class="page-description">系统概览和关键指标</p>
                </div>
                
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon users"><i class="fas fa-users"></i></div>
                        <div class="stat-info"><h3 id="totalUsers">0</h3><p>总用户数</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon dramas"><i class="fas fa-film"></i></div>
                        <div class="stat-info"><h3 id="totalDramas">0</h3><p>总剧集数</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon episodes"><i class="fas fa-list-ol"></i></div>
                        <div class="stat-info"><h3 id="totalEpisodes">0</h3><p>总分集数</p></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon revenue"><i class="fas fa-dollar-sign"></i></div>
                        <div class="stat-info"><h3 id="monthlyRevenue">$0</h3><p>本月收入</p></div>
                    </div>
                </div>
                
                <!-- 图表占位区 -->
                <div class="chart-container">
                    <h3 class="chart-title">用户增长趋势</h3>
                    <div style="height:300px; background:#f5f5f5; display:flex; align-items:center; justify-content:center; color:var(--gray);">图表占位区</div>
                </div>
                
                <!-- 最近活动表格 -->
                <div class="card">
                    <div class="card-header"><h3 class="card-title">最近活动</h3></div>
                    <div class="card-content">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>用户</th>
                                    <th>操作</th>
                                    <th>时间</th>
                                    <th>IP地址</th>
                                </tr>
                            </thead>
                            <tbody id="recentActivityBody">
                                <tr><td colspan="4" class="empty-placeholder">暂无活动数据</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 语言选择模态框 -->
    <div class="modal-overlay" id="languageModal">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h3 class="modal-title">选择语言</h3>
                <button class="modal-close" id="closeLanguageModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="language-options">
                    <div class="language-option active" data-lang="zh">中文</div>
                    <div class="language-option" data-lang="en">English</div>
                </div>
            </div>
        </div>
    </div>

    <!-- JS 脚本 -->
    <script src="js/admin-core.js"></script>
    <script src="js/admin-system.js"></script>
</body>
</html>
