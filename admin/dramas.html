<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧集管理 - Global Shorts 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-common.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="admin-header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="logo"><i class="fas fa-globe-americas"></i><span>Global Shorts 后台</span></div>
        </div>
        <div class="header-right">
            <div class="language-switcher" id="languageSwitcher">
                <i class="fas fa-language"></i><span id="currentLanguage">中文</span><i class="fas fa-chevron-down"></i>
            </div>
            <div class="admin-user" id="userMenuTrigger" style="position:relative; cursor:pointer;">
                <div class="user-avatar" id="userAvatar">AD</div>
                <div>
                    <div id="adminName">管理员</div>
                    <div style="font-size:12px;color:var(--gray)" id="adminRole">超级管理员</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 用户下拉菜单 -->
    <div class="user-dropdown" id="userDropdown" style="display:none; position:absolute; top:60px; right:20px; background:white; border-radius:8px; box-shadow:0 8px 16px rgba(0,0,0,0.1); z-index:1000; min-width:180px;">
        <a href="/admin/profile.html"><i class="fas fa-user"></i>个人资料</a>
        <a href="/admin/settings.html"><i class="fas fa-cog"></i>账户设置</a>
        <a href="/admin/change-password.html"><i class="fas fa-key"></i>修改密码</a>
        <div class="dropdown-divider"></div>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>退出登录</a>
    </div>

    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-menu">
                <a href="/admin/dashboard.html" class="menu-item"><i class="fas fa-tachometer-alt"></i><span>仪表盘</span></a>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-user-menu" class="submenu-toggle">
                    <label for="toggle-user-menu"><i class="fas fa-users"></i><span>用户管理</span><i class="fas fa-chevron-down arrow"></i></label>
                    <div class="submenu"><a href="/admin/users.html" class="submenu-item">用户列表</a><a href="/admin/vip-users.html" class="submenu-item">VIP用户</a><a href="/admin/user-analysis.html" class="submenu-item">用户分析</a></div>
                </div>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-content-menu" class="submenu-toggle">
                    <label for="toggle-content-menu"><i class="fas fa-film"></i><span>内容管理</span><i class="fas fa-chevron-down arrow"></i></label>
                    <div class="submenu"><a href="/admin/dramas.html" class="submenu-item">剧集管理</a><a href="/admin/episodes.html" class="submenu-item">分集管理</a><a href="/admin/batch-upload.html" class="submenu-item">批量上传</a><a href="/admin/categories.html" class="submenu-item">分类管理</a></div>
                </div>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-operation-menu" class="submenu-toggle">
                    <label for="toggle-operation-menu"><i class="fas fa-chart-line"></i><span>运营分析</span><i class="fas fa-chevron-down arrow"></i></label>
                    <div class="submenu"><a href="/admin/revenue.html" class="submenu-item">收入分析</a><a href="/admin/region-analysis.html" class="submenu-item">地区分析</a><a href="/admin/content-performance.html" class="submenu-item">内容表现</a></div>
                </div>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-system-menu" class="submenu-toggle">
                    <label for="toggle-system-menu"><i class="fas fa-cog"></i><span>系统管理</span><i class="fas fa-chevron-down arrow"></i></label>
                    <div class="submenu"><a href="/admin/admin-manage.html" class="submenu-item">管理员管理</a><a href="/admin/region-language.html" class="submenu-item">区域语言</a><a href="/admin/payment-interface.html" class="submenu-item">支付接口</a><a href="/admin/vip-plans.html" class="submenu-item">VIP套餐</a><a href="/admin/coin-packages.html" class="submenu-item">金币套餐</a><a href="/admin/withdrawals.html" class="submenu-item">提现管理</a><a href="/admin/ad-positions.html" class="submenu-item">广告位管理</a><a href="/admin/system-settings.html" class="submenu-item">系统设置</a><a href="/admin/frontend-manage.html" class="submenu-item">前台管理</a></div>
                </div>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-personal-menu" class="submenu-toggle">
                    <label for="toggle-personal-menu"><i class="fas fa-user-cog"></i><span>个人设置</span><i class="fas fa-chevron-down arrow"></i></label>
                    <div class="submenu"><a href="/admin/profile.html" class="submenu-item">个人资料</a><a href="/admin/change-password.html" class="submenu-item">修改密码</a><a href="/admin/settings.html" class="submenu-item">账户设置</a></div>
                </div>
            </div>
        </aside>

        <main class="admin-main">
            <div class="page-header">
                <h1 class="page-title">剧集管理</h1>
                <p class="page-description">管理所有短剧，包括剧集信息、分类和状态</p>
            </div>

            <!-- 搜索/筛选栏 -->
            <div class="search-filter">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" id="dramaSearch" placeholder="搜索剧集名称或ID">
                </div>
                <select class="form-control" style="width:150px;" id="dramaCategoryFilter">
                    <option value="">所有分类</option>
                </select>
                <select class="form-control" style="width:150px;" id="dramaStatusFilter">
                    <option value="">所有状态</option>
                    <option value="published">已发布</option>
                    <option value="draft">草稿</option>
                    <option value="hidden">隐藏</option>
                </select>
                <button class="btn btn-primary" id="addDramaBtn"><i class="fas fa-plus"></i>添加剧集</button>
                <button class="btn btn-secondary" id="exportDramasBtn"><i class="fas fa-download"></i>导出</button>
            </div>

            <!-- 剧集列表表格 -->
            <div class="card">
                <div class="card-header"><h3 class="card-title">剧集列表</h3></div>
                <div class="card-content">
                    <table class="admin-table">
                        <thead><tr><th>ID</th><th>封面</th><th>剧集名称</th><th>分类</th><th>语言</th><th>集数</th><th>播放量</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody id="dramaTableBody"><tr><td colspan="9" class="empty-placeholder">加载中...</td></tr></tbody>
                    </table>
                    <div class="pagination" id="dramaPagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加/编辑剧集模态框 -->
    <div class="modal-overlay" id="addDramaModal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title" id="dramaModalTitle">添加新剧集</h3><button class="modal-close" id="closeDramaModal"><i class="fas fa-times"></i></button></div>
            <div class="modal-body">
                <form id="dramaForm">
                    <input type="hidden" id="dramaId">
                    
                    <div class="form-group">
                        <label class="form-label">封面图片 <span style="color:var(--error);">*</span></label>
                        <div style="display:flex; gap:20px; align-items:flex-start;">
                            <div style="width:120px; height:160px; background:var(--gray-light); border-radius:4px; border:1px solid var(--border); overflow:hidden; display:flex; align-items:center; justify-content:center;" id="coverPreviewContainer">
                                <img id="coverPreview" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                                <i class="fas fa-image" style="font-size:32px; color:var(--gray);" id="coverPlaceholder"></i>
                            </div>
                            <div style="flex:1;">
                                <div style="margin-bottom:12px;"><label class="form-label">上传图片文件</label><input type="file" class="form-control" id="coverFile" accept="image/*"><small style="color:var(--gray);">支持 JPG、PNG、GIF，推荐尺寸 500x750px</small></div>
                                <div style="margin-bottom:12px;"><label class="form-label">或输入图片链接</label><input type="text" class="form-control" id="dramaCover" placeholder="https://example.com/cover.jpg"></div>
                                <div><button type="button" class="btn btn-sm btn-secondary" id="uploadCoverBtn">上传并预览</button></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group"><label class="form-label">剧集名称 <span style="color:var(--error);">*</span></label><input type="text" class="form-control" id="dramaTitle" required></div>
                    <div class="form-group"><label class="form-label">描述</label><textarea class="form-control" id="dramaDescription" rows="3"></textarea></div>
                    
                    <div class="row" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                        <div class="form-group"><label class="form-label">分类 <span style="color:var(--error);">*</span></label><select class="form-control" id="dramaCategory" required></select></div>
                        <div class="form-group"><label class="form-label">主要语言</label><select class="form-control" id="dramaLanguage"></select></div>
                    </div>

                    <div class="row" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                        <div class="form-group"><label class="form-label">目标地区</label><select class="form-control" id="dramaRegion"><option value="global" selected>全球</option><option value="china">中国</option><option value="north_america">北美</option><option value="europe">欧洲</option><option value="south_america">南美</option></select></div>
                        <div class="form-group"><label class="form-label">总集数</label><input type="number" class="form-control" id="dramaTotalEpisodes" value="0"></div>
                    </div>

                    <div class="form-group"><label class="form-label">可用字幕语言</label><select class="form-control" id="dramaSubtitles" multiple style="height:80px;"></select><small style="color:var(--gray);">按住Ctrl多选</small></div>
                    
                    <div class="row" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                        <div class="form-group"><label class="form-label">状态</label><select class="form-control" id="dramaStatus"><option value="draft">草稿</option><option value="published">已发布</option><option value="hidden">隐藏</option></select></div>
                        <div class="form-group"><label class="form-label">标签（逗号分隔）</label><input type="text" class="form-control" id="dramaTags" placeholder="例如：热门, 新剧, 独家"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" id="cancelDramaBtn">取消</button><button class="btn btn-primary" id="saveDramaBtn">保存剧集</button></div>
        </div>
    </div>

    <script src="js/admin-core.js"></script>
<script src="js/admin-content.js"></script>
<script>
    // 使用 window.API_BASE 和 window.UPLOAD_BASE（已在 admin-core.js 中定义）
    let currentPage = 1;
    let currentFilters = { search: '', category: '', status: '' };
    let languageList = [];
    let categoryList = [];

    document.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login.html'; return; }
        await loadLanguageList();
        await loadCategoryList();
        await loadDramas();
        bindEvents();
    });

    async function loadLanguageList() {
        try {
            const res = await fetch(`${window.API_BASE}/languages`, { 
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } 
            });
            const data = await res.json();
            if (data.success && Array.isArray(data.data)) {
                languageList = data.data;
            } else {
                console.error('语言列表加载失败:', data);
                languageList = [];
            }
        } catch (error) {
            console.error('加载语言列表失败:', error);
            languageList = [];
        }
    }

    async function loadCategoryList() {
        try {
            const res = await fetch(`${window.API_BASE}/categories`, { 
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } 
            });
            const data = await res.json();
            if (data.success && Array.isArray(data.data)) {
                categoryList = data.data;
            } else {
                console.error('分类列表加载失败:', data);
                categoryList = [];
            }
        } catch (error) {
            console.error('加载分类列表失败:', error);
            categoryList = [];
        }
    }

    function renderCategorySelects(selectedCategory = '') {
        const select = document.getElementById('dramaCategory');
        if (select) {
            if (categoryList.length === 0) {
                select.innerHTML = '<option value="">加载中...</option>';
                return;
            }
            let options = '<option value="">选择分类</option>';
            categoryList.forEach(cat => options += `<option value="${cat.id}" ${cat.id === selectedCategory ? 'selected' : ''}>${cat.name}</option>`);
            select.innerHTML = options;
        }
        const filterSelect = document.getElementById('dramaCategoryFilter');
        if (filterSelect) {
            if (categoryList.length === 0) {
                filterSelect.innerHTML = '<option value="">所有分类</option>';
                return;
            }
            let options = '<option value="">所有分类</option>';
            categoryList.forEach(cat => options += `<option value="${cat.id}" ${cat.id === currentFilters.category ? 'selected' : ''}>${cat.name}</option>`);
            filterSelect.innerHTML = options;
        }
    }

    function renderLanguageSelects(selectedLanguage = 'en-US', selectedSubtitles = []) {
        const langSelect = document.getElementById('dramaLanguage');
        if (langSelect) {
            if (languageList.length === 0) {
                langSelect.innerHTML = '<option value="">加载中...</option>';
                return;
            }
            let options = '';
            languageList.forEach(lang => options += `<option value="${lang.code}" ${lang.code === selectedLanguage ? 'selected' : ''}>${lang.name} (${lang.code})</option>`);
            langSelect.innerHTML = options;
        }
        const subSelect = document.getElementById('dramaSubtitles');
        if (subSelect) {
            if (languageList.length === 0) {
                subSelect.innerHTML = '<option value="">加载中...</option>';
                return;
            }
            let options = '';
            languageList.forEach(lang => options += `<option value="${lang.code}" ${selectedSubtitles.includes(lang.code) ? 'selected' : ''}>${lang.name} (${lang.code})</option>`);
            subSelect.innerHTML = options;
        }
    }

    function bindEvents() {
        document.getElementById('addDramaBtn').addEventListener('click', openAddModal);
        document.getElementById('closeDramaModal').addEventListener('click', () => adminCore.closeModal('addDramaModal'));
        document.getElementById('cancelDramaBtn').addEventListener('click', () => adminCore.closeModal('addDramaModal'));
        document.getElementById('saveDramaBtn').addEventListener('click', saveDrama);
        document.getElementById('uploadCoverBtn').addEventListener('click', uploadCover);
        document.getElementById('dramaCover').addEventListener('input', previewCover);
        document.getElementById('dramaSearch').addEventListener('input', debounce(searchDramas, 500));
        document.getElementById('dramaCategoryFilter').addEventListener('change', filterDramas);
        document.getElementById('dramaStatusFilter').addEventListener('change', filterDramas);
    }

    function previewCover(e) { 
        if (e.target.value) { 
            document.getElementById('coverPreview').src = e.target.value; 
            document.getElementById('coverPreview').style.display = 'block'; 
            document.getElementById('coverPlaceholder').style.display = 'none'; 
        } 
    }

    async function uploadCover() {
        const file = document.getElementById('coverFile').files[0];
        if (!file) { alert('请选择要上传的图片'); return; }
        const token = localStorage.getItem('token');
        const formData = new FormData();
        formData.append('file', file);
        formData.append('type', 'cover');
        try {
            const btn = document.getElementById('uploadCoverBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上传中...';
            // 修改：使用 window.UPLOAD_BASE
            const res = await fetch(`${window.UPLOAD_BASE}/upload/image`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
            const data = await res.json();
            if (data.success) {
                document.getElementById('dramaCover').value = data.url;
                document.getElementById('coverPreview').src = data.url;
                document.getElementById('coverPreview').style.display = 'block';
                document.getElementById('coverPlaceholder').style.display = 'none';
                alert('图片上传成功！');
            } else alert('上传失败：' + data.error);
        } catch (error) { alert('网络错误，请重试'); } finally { const btn = document.getElementById('uploadCoverBtn'); btn.disabled = false; btn.innerHTML = '上传并预览'; }
    }

    function openAddModal() {
        document.getElementById('dramaId').value = '';
        document.getElementById('dramaForm').reset();
        document.getElementById('coverPreview').style.display = 'none';
        document.getElementById('coverPlaceholder').style.display = 'block';
        document.getElementById('dramaModalTitle').textContent = '添加新剧集';
        renderCategorySelects('');
        renderLanguageSelects(languageList[0]?.code || 'en-US', []);
        adminCore.openModal('addDramaModal');
    }

    async function loadDramas() {
        const tbody = document.getElementById('dramaTableBody');
        const token = localStorage.getItem('token');
        try {
            const params = new URLSearchParams({ page: currentPage, limit: 10, search: currentFilters.search, category: currentFilters.category, status: currentFilters.status });
            // 修改：使用 window.API_BASE
            const res = await fetch(`${window.API_BASE}/dramas?${params}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.success) { renderDramas(data.data); if (data.pagination) updatePagination(data.pagination); }
            else tbody.innerHTML = '<tr><td colspan="9" class="empty-placeholder">加载失败</td></tr>';
        } catch (error) { tbody.innerHTML = '<tr><td colspan="9" class="empty-placeholder">加载失败</td></tr>'; }
    }

    function renderDramas(dramas) {
        const tbody = document.getElementById('dramaTableBody');
        if (!dramas || !dramas.length) { 
            tbody.innerHTML = '<tr><td colspan="9" class="empty-placeholder">暂无剧集</td></tr>'; 
            return; 
        }
        tbody.innerHTML = '';
        dramas.forEach(drama => {
            const statusClass = drama.status === 'published' ? 'status-active' : (drama.status === 'draft' ? 'status-inactive' : 'status-suspended');
            const statusText = drama.status === 'published' ? '已发布' : (drama.status === 'draft' ? '草稿' : '隐藏');
            
            const langObj = languageList.find(l => l.code === drama.language);
            const languageName = langObj ? langObj.name : (drama.language || '-');
            
            const catObj = categoryList.find(c => c.id === drama.category);
            const categoryName = catObj ? catObj.name : (drama.category || '-');
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${drama.id.substring(0, 8)}...</td>
                <td>${drama.cover_url ? `<img src="${drama.cover_url}" style="width:40px; height:50px; object-fit:cover; border-radius:4px;">` : '<span style="color:var(--gray);">无封面</span>'}</td>
                <td><a href="/admin/episodes.html?drama_id=${drama.id}" style="color:var(--primary);">${drama.title}</a></td>
                <td>${categoryName}</td>
                <td>${languageName}</td>
                <td>${drama.total_episodes || 0}</td>
                <td>${(drama.view_count || 0).toLocaleString()}</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td>
                    <button class="btn btn-sm btn-secondary" onclick="editDrama('${drama.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="deleteDrama('${drama.id}')"><i class="fas fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.editDrama = async function(id) {
        const token = localStorage.getItem('token');
        try {
            // 修改：使用 window.API_BASE
            const res = await fetch(`${window.API_BASE}/dramas/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.success) {
                const drama = data.data;
                document.getElementById('dramaId').value = drama.id;
                document.getElementById('dramaTitle').value = drama.title;
                document.getElementById('dramaDescription').value = drama.description || '';
                renderCategorySelects(drama.category || '');
                renderLanguageSelects(drama.language || 'en-US', drama.subtitles || []);
                document.getElementById('dramaRegion').value = drama.region || 'global';
                document.getElementById('dramaTotalEpisodes').value = drama.total_episodes || 0;
                document.getElementById('dramaStatus').value = drama.status || 'draft';
                document.getElementById('dramaTags').value = drama.tags || '';
                if (drama.cover_url) {
                    document.getElementById('dramaCover').value = drama.cover_url;
                    document.getElementById('coverPreview').src = drama.cover_url;
                    document.getElementById('coverPreview').style.display = 'block';
                    document.getElementById('coverPlaceholder').style.display = 'none';
                } else {
                    document.getElementById('dramaCover').value = '';
                    document.getElementById('coverPreview').style.display = 'none';
                    document.getElementById('coverPlaceholder').style.display = 'block';
                }
                document.getElementById('dramaModalTitle').textContent = '编辑剧集';
                adminCore.openModal('addDramaModal');
            }
        } catch (error) { alert('加载剧集失败'); }
    };

    window.deleteDrama = async function(id) {
        if (!confirm('确定要删除该剧集吗？此操作不可撤销。')) return;
        const token = localStorage.getItem('token');
        try {
            // 修改：使用 window.API_BASE
            const res = await fetch(`${window.API_BASE}/dramas/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            if (data.success) { await loadDramas(); alert('删除成功！'); }
            else alert('删除失败：' + data.error);
        } catch (error) { alert('网络错误，请重试'); }
    };

    async function saveDrama() {
        const token = localStorage.getItem('token');
        const dramaId = document.getElementById('dramaId').value;
        const subtitleSelect = document.getElementById('dramaSubtitles');
        const subtitles = Array.from(subtitleSelect.selectedOptions).map(o => o.value);
        const formData = {
            title: document.getElementById('dramaTitle').value,
            description: document.getElementById('dramaDescription').value,
            cover_url: document.getElementById('dramaCover').value,
            category: document.getElementById('dramaCategory').value,
            language: document.getElementById('dramaLanguage').value,
            region: document.getElementById('dramaRegion').value,
            total_episodes: parseInt(document.getElementById('dramaTotalEpisodes').value) || 0,
            status: document.getElementById('dramaStatus').value,
            tags: document.getElementById('dramaTags').value.split(',').map(t => t.trim()).filter(t => t),
            subtitles: subtitles
        };
        if (!formData.title || !formData.category) { alert('请填写必填字段'); return; }
        const url = dramaId ? `${window.API_BASE}/dramas/${dramaId}` : `${window.API_BASE}/dramas`;
        const method = dramaId ? 'PUT' : 'POST';
        try {
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(formData) });
            const data = await res.json();
            if (data.success) { adminCore.closeModal('addDramaModal'); await loadDramas(); alert('保存成功！'); }
            else alert('保存失败：' + data.error);
        } catch (error) { alert('网络错误，请重试'); }
    }

    function searchDramas() { currentFilters.search = document.getElementById('dramaSearch').value; currentPage = 1; loadDramas(); }
    function filterDramas() { currentFilters.category = document.getElementById('dramaCategoryFilter').value; currentFilters.status = document.getElementById('dramaStatusFilter').value; currentPage = 1; loadDramas(); }
    
    function updatePagination(pagination) {
        const container = document.getElementById('dramaPagination');
        if (!container) return;
        if (pagination.total_pages <= 1) { container.style.display = 'none'; return; }
        container.style.display = 'flex';
        let html = '';
        for (let i = 1; i <= pagination.total_pages; i++) html += `<div class="page-item ${i === pagination.current_page ? 'active' : ''}" data-page="${i}">${i}</div>`;
        container.innerHTML = html;
        container.querySelectorAll('.page-item').forEach(item => item.addEventListener('click', (e) => { const page = parseInt(e.target.dataset.page); if (page && page !== pagination.current_page) { currentPage = page; loadDramas(); } }));
    }
    
    function debounce(fn, delay) { let timer; return function() { clearTimeout(timer); timer = setTimeout(fn, delay); }; }
</script>
</body>
</html>
