<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - Global Shorts 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/admin-common.css">
</head>
<body>
    <header class="admin-header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="logo">
                <i class="fas fa-globe-americas"></i>
                <span>Global Shorts 后台</span>
            </div>
        </div>
        <div class="header-right">
            <div class="language-switcher" id="languageSwitcher">
                <i class="fas fa-language"></i>
                <span id="currentLanguage">中文</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="admin-user" id="userMenuTrigger" style="position:relative; cursor:pointer;">
                <div class="user-avatar" id="userAvatar">AD</div>
                <div>
                    <div id="adminName">管理员</div>
                    <div style="font-size:12px;color:var(--gray)" id="adminRole">超级管理员</div>
                </div>
            </div>
        </div>
    </header>

    <div class="user-dropdown" id="userDropdown" style="display:none; position:absolute; top:60px; right:20px; background:white; border-radius:8px; box-shadow:0 8px 16px rgba(0,0,0,0.1); z-index:1000; min-width:180px;">
        <a href="/admin/profile.html"><i class="fas fa-user"></i>个人资料</a>
        <a href="/admin/settings.html"><i class="fas fa-cog"></i>账户设置</a>
        <a href="/admin/change-password.html"><i class="fas fa-key"></i>修改密码</a>
        <div class="dropdown-divider"></div>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>退出登录</a>
    </div>

    <div class="admin-container">
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-menu">
                <a href="/admin/dashboard.html" class="menu-item">
                    <i class="fas fa-tachometer-alt"></i><span>仪表盘</span>
                </a>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-user-menu" class="submenu-toggle">
                    <label for="toggle-user-menu">
                        <i class="fas fa-users"></i>
                        <span>用户管理</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </label>
                    <div class="submenu">
                        <a href="/admin/users.html" class="submenu-item">用户列表</a>
                        <a href="/admin/vip-users.html" class="submenu-item">VIP用户</a>
                        <a href="/admin/user-analysis.html" class="submenu-item">用户分析</a>
                    </div>
                </div>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-content-menu" class="submenu-toggle">
                    <label for="toggle-content-menu">
                        <i class="fas fa-film"></i>
                        <span>内容管理</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </label>
                    <div class="submenu">
                        <a href="/admin/dramas.html" class="submenu-item">剧集管理</a>
                        <a href="/admin/episodes.html" class="submenu-item">分集管理</a>
                        <a href="/admin/batch-upload.html" class="submenu-item">批量上传</a>
                        <a href="/admin/categories.html" class="submenu-item">分类管理</a>
                    </div>
                </div>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-system-menu" class="submenu-toggle">
                    <label for="toggle-system-menu">
                        <i class="fas fa-cog"></i>
                        <span>系统管理</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </label>
                    <div class="submenu">
                        <a href="/admin/admin-manage.html" class="submenu-item">管理员管理</a>
                        <a href="/admin/region-language.html" class="submenu-item">区域语言</a>
                        <a href="/admin/payment-interface.html" class="submenu-item">支付接口</a>
                        <a href="/admin/vip-plans.html" class="submenu-item">VIP套餐</a>
                        <a href="/admin/coin-packages.html" class="submenu-item">金币套餐</a>
                        <a href="/admin/ad-positions.html" class="submenu-item">广告位管理</a>
                        <a href="/admin/system-settings.html" class="submenu-item">系统设置</a>
                        <a href="/admin/frontend-manage.html" class="submenu-item">前台管理</a>
                    </div>
                </div>
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-personal-menu" class="submenu-toggle">
                    <label for="toggle-personal-menu">
                        <i class="fas fa-user-cog"></i>
                        <span>个人设置</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </label>
                    <div class="submenu">
                        <a href="/admin/profile.html" class="submenu-item">个人资料</a>
                        <a href="/admin/change-password.html" class="submenu-item">修改密码</a>
                        <a href="/admin/settings.html" class="submenu-item">账户设置</a>
                    </div>
                </div>
            </div>
        </aside>

        <main class="admin-main">
            <div class="page-header">
                <h1 class="page-title">修改密码</h1>
                <p class="page-description">定期更换密码可以提高账户安全性</p>
            </div>

            <div style="max-width:500px; margin:0 auto;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">密码设置</h3>
                    </div>
                    <div class="card-content">
                        <form id="passwordForm">
                            <div class="form-group">
                                <label class="form-label">当前密码 <span style="color:var(--error);">*</span></label>
                                <input type="password" class="form-control" id="currentPassword" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">新密码 <span style="color:var(--error);">*</span></label>
                                <input type="password" class="form-control" id="newPassword" required>
                                <small style="color:var(--gray);">密码至少8位，包含字母和数字</small>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">确认新密码 <span style="color:var(--error);">*</span></label>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>

                            <!-- 密码强度指示器 -->
                            <div style="margin-top:20px; margin-bottom:20px;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                    <span>密码强度</span>
                                    <span id="strengthText">弱</span>
                                </div>
                                <div style="display:flex; gap:4px; height:8px;">
                                    <div id="strength1" style="flex:1; background:var(--border); border-radius:4px;"></div>
                                    <div id="strength2" style="flex:1; background:var(--border); border-radius:4px;"></div>
                                    <div id="strength3" style="flex:1; background:var(--border); border-radius:4px;"></div>
                                </div>
                            </div>

                            <div style="display:flex; gap:16px; justify-content:flex-end; margin-top:24px;">
                                <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                                <button type="submit" class="btn btn-primary" id="submitBtn">确认修改</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 语言选择模态框 -->
    <div class="modal-overlay" id="languageModal">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h3 class="modal-title">选择语言</h3>
                <button class="modal-close" id="closeLanguageModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="language-option" data-lang="zh"><i class="fas fa-check"></i> 中文</div>
                <div class="language-option" data-lang="en">English</div>
            </div>
        </div>
    </div>

    <script src="/js/admin-core.js"></script>
    <script>
        // 使用 window.API_BASE（已在 admin-core.js 中定义为 '/api/admin'）

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            // 获取用户信息显示
            const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            if (userInfo.name) {
                document.getElementById('adminName').textContent = userInfo.name;
                document.getElementById('userAvatar').textContent = userInfo.name.charAt(0).toUpperCase();
            }
            if (userInfo.role) {
                document.getElementById('adminRole').textContent = userInfo.role;
            }

            // 绑定事件
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('adminSidebar').classList.toggle('active');
            });

            document.getElementById('userMenuTrigger').addEventListener('click', (e) => {
                e.stopPropagation();
                const dropdown = document.getElementById('userDropdown');
                dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
            });

            document.addEventListener('click', () => {
                document.getElementById('userDropdown').style.display = 'none';
            });

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('token');
                localStorage.removeItem('userInfo');
                window.location.href = '/login.html';
            });

            // 语言切换
            const languageSwitcher = document.getElementById('languageSwitcher');
            const languageModal = document.getElementById('languageModal');
            const closeLanguageModal = document.getElementById('closeLanguageModal');

            languageSwitcher.addEventListener('click', () => {
                languageModal.classList.add('active');
            });

            closeLanguageModal.addEventListener('click', () => {
                languageModal.classList.remove('active');
            });

            document.querySelectorAll('.language-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const lang = opt.dataset.lang;
                    if (lang && window.adminCore) {
                        window.adminCore.switchLanguage(lang);
                    }
                    languageModal.classList.remove('active');
                });
            });

            // 密码强度检测
            const newPasswordInput = document.getElementById('newPassword');
            newPasswordInput.addEventListener('input', checkPasswordStrength);

            // 表单提交
            const passwordForm = document.getElementById('passwordForm');
            passwordForm.addEventListener('submit', changePassword);

            // 取消按钮
            document.getElementById('cancelBtn').addEventListener('click', () => {
                window.location.href = '/admin/profile.html';
            });
        });

        // 密码强度检测函数
        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthText = document.getElementById('strengthText');
            const strength1 = document.getElementById('strength1');
            const strength2 = document.getElementById('strength2');
            const strength3 = document.getElementById('strength3');

            let strength = 0;
            
            // 长度检查
            if (password.length >= 8) strength++;
            // 包含数字
            if (/[0-9]/.test(password)) strength++;
            // 包含字母
            if (/[a-zA-Z]/.test(password)) strength++;
            // 包含特殊字符
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            // 重置颜色
            strength1.style.background = 'var(--border)';
            strength2.style.background = 'var(--border)';
            strength3.style.background = 'var(--border)';

            if (password.length === 0) {
                strengthText.textContent = '弱';
                strengthText.style.color = 'var(--error)';
                return;
            }

            if (strength <= 2) {
                strengthText.textContent = '弱';
                strengthText.style.color = 'var(--error)';
                strength1.style.background = 'var(--error)';
            } else if (strength === 3) {
                strengthText.textContent = '中';
                strengthText.style.color = 'var(--warning)';
                strength1.style.background = 'var(--warning)';
                strength2.style.background = 'var(--warning)';
            } else {
                strengthText.textContent = '强';
                strengthText.style.color = 'var(--success)';
                strength1.style.background = 'var(--success)';
                strength2.style.background = 'var(--success)';
                strength3.style.background = 'var(--success)';
            }
        }

        // 修改密码
        async function changePassword(event) {
            event.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 表单验证
            if (!currentPassword) {
                alert('请输入当前密码');
                return;
            }

            if (!newPassword) {
                alert('请输入新密码');
                return;
            }

            if (newPassword.length < 8) {
                alert('新密码长度至少为8位');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('两次输入的新密码不一致');
                return;
            }

            const token = localStorage.getItem('token');
            
            try {
                // 修改：使用 window.API_BASE
                const response = await fetch(`${window.API_BASE}/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('密码修改成功！请重新登录');
                    localStorage.removeItem('token');
                    localStorage.removeItem('userInfo');
                    window.location.href = '/login.html';
                } else {
                    alert('修改失败：' + (data.error || data.message || '未知错误'));
                }
            } catch (error) {
                console.error('修改密码失败:', error);
                alert('网络错误，请重试');
            }
        }
    </script>
</body>
</html>
