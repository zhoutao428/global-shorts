    <main class="admin-main">
        <div class="page-header">
            <h1 class="page-title">提现管理</h1>
            <p class="page-description">审核用户提现申请</p>
        </div>

        <!-- 筛选栏 -->
        <div class="search-filter" style="justify-content:space-between;">
            <div style="display:flex; gap:12px;">
                <select class="form-control" style="width:150px;" id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="pending">待审核</option>
                    <option value="approved">已通过</option>
                    <option value="rejected">已拒绝</option>
                    <option value="completed">已完成</option>
                </select>
                <button class="btn btn-primary" id="applyFilterBtn">筛选</button>
            </div>
        </div>

        <!-- 提现列表表格 -->
        <div class="card">
            <div class="card-content">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户</th>
                            <th>金额（金币）</th>
                            <th>方式</th>
                            <th>账户</th>
                            <th>状态</th>
                            <th>申请时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="withdrawalsTableBody">
                        <tr><td colspan="8" class="empty-placeholder">加载中...</td></tr>
                    </tbody>
                </table>
                <!-- 分页 -->
                <div class="pagination" id="withdrawalsPagination" style="margin-top:20px;"></div>
            </div>
        </div>
    </main>

    <!-- 审核模态框 -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">审核提现</h3>
                <button class="modal-close" id="closeReviewModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="reviewForm">
                    <input type="hidden" id="withdrawalId">
                    <div class="form-group">
                        <label class="form-label">当前状态</label>
                        <span id="currentStatus"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">审核结果</label>
                        <select class="form-control" id="reviewStatus">
                            <option value="approved">通过</option>
                            <option value="rejected">拒绝</option>
                            <option value="completed">标记为已完成</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="reviewRemark" rows="3" placeholder="可选"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelReviewBtn">取消</button>
                <button class="btn btn-primary" id="submitReviewBtn">提交</button>
            </div>
        </div>
    </div>

    <script src="js/admin-core.js"></script>
    <script>
        const API_BASE = 'https://global-shorts-api.z17756037070.workers.dev/api/admin';
        let currentPage = 1;
        let currentStatus = '';

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            await loadWithdrawals();

            document.getElementById('applyFilterBtn').addEventListener('click', () => {
                currentStatus = document.getElementById('statusFilter').value;
                currentPage = 1;
                loadWithdrawals();
            });

            // 分页点击委托
            document.getElementById('withdrawalsPagination').addEventListener('click', (e) => {
                if (e.target.classList.contains('page-item')) {
                    const page = parseInt(e.target.dataset.page);
                    if (page && page !== currentPage) {
                        currentPage = page;
                        loadWithdrawals();
                    }
                }
            });

            // 审核模态框相关
            document.getElementById('closeReviewModal').addEventListener('click', () => {
                document.getElementById('reviewModal').classList.remove('active');
            });
            document.getElementById('cancelReviewBtn').addEventListener('click', () => {
                document.getElementById('reviewModal').classList.remove('active');
            });
            document.getElementById('submitReviewBtn').addEventListener('click', submitReview);
        });

        async function loadWithdrawals() {
            const token = localStorage.getItem('token');
            const params = new URLSearchParams({
                page: currentPage,
                limit: 10,
            });
            if (currentStatus) params.append('status', currentStatus);

            try {
                const response = await fetch(`${API_BASE}/withdrawals?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    renderWithdrawals(data.data, data.pagination);
                } else {
                    alert('加载失败：' + data.error);
                }
            } catch (error) {
                console.error('加载提现列表失败', error);
            }
        }

        function renderWithdrawals(withdrawals, pagination) {
            const tbody = document.getElementById('withdrawalsTableBody');
            if (withdrawals.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-placeholder">暂无提现记录</td></tr>';
                return;
            }

            tbody.innerHTML = withdrawals.map(w => `
                <tr>
                    <td>${w.id.slice(0,8)}...</td>
                    <td>${w.userNickname || w.userEmail}</td>
                    <td>${w.amount}</td>
                    <td>${w.method}</td>
                    <td>${w.account}</td>
                    <td>${getStatusBadge(w.status)}</td>
                    <td>${new Date(w.createdAt).toLocaleString()}</td>
                    <td>
                        ${w.status === 'pending' ? `<button class="btn btn-sm btn-primary" onclick="openReviewModal('${w.id}')">审核</button>` : ''}
                        <button class="btn btn-sm btn-secondary" onclick="viewDetail('${w.id}')">详情</button>
                    </td>
                </tr>
            `).join('');

            // 渲染分页
            const paginationDiv = document.getElementById('withdrawalsPagination');
            let pages = '';
            for (let i = 1; i <= pagination.pages; i++) {
                pages += `<div class="page-item ${i === pagination.page ? 'active' : ''}" data-page="${i}">${i}</div>`;
            }
            paginationDiv.innerHTML = pages;
        }

        function getStatusBadge(status) {
            const map = {
                'pending': '<span style="color:orange;">待审核</span>',
                'approved': '<span style="color:green;">已通过</span>',
                'rejected': '<span style="color:red;">已拒绝</span>',
                'completed': '<span style="color:blue;">已完成</span>'
            };
            return map[status] || status;
        }

        window.openReviewModal = function(id) {
            document.getElementById('withdrawalId').value = id;
            // 可以调用接口获取详情，这里简单起见直接打开模态框
            document.getElementById('reviewModal').classList.add('active');
        };

        window.viewDetail = function(id) {
            // 可跳转到详情页或弹出详情，暂略
            alert('查看详情：' + id);
        };

        async function submitReview() {
            const id = document.getElementById('withdrawalId').value;
            const status = document.getElementById('reviewStatus').value;
            const remark = document.getElementById('reviewRemark').value;

            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_BASE}/withdrawals/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status, remark })
                });
                const data = await response.json();
                if (data.success) {
                    alert('操作成功');
                    document.getElementById('reviewModal').classList.remove('active');
                    loadWithdrawals();
                } else {
                    alert('操作失败：' + data.error);
                }
            } catch (error) {
                alert('网络错误');
            }
        }
    </script>
</body>
