<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量上传 - Global Shorts 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-common.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        .free-badge { background: #52c41a; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 8px; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); }
        .file-info { flex: 2; display: flex; align-items: center; gap: 12px; }
        .file-meta { flex: 1; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .file-actions { display: flex; gap: 8px; }
        .upload-status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .status-pending { background: #e6f7ff; color: #1890ff; }
        .status-uploading { background: #fff7e6; color: #faad14; }
        .status-success { background: #f6ffed; color: #52c41a; }
        .status-failed { background: #fff2f0; color: #f5222d; }
        .progress-bar-fill { height: 100%; background: #1890ff; border-radius: 2px; transition: width 0.3s; }
        .queue-stats { display: flex; gap: 24px; margin-bottom: 16px; padding: 12px; background: var(--gray-light); border-radius: 8px; flex-wrap: wrap; }
        .queue-stat { display: flex; flex-direction: column; align-items: center; }
        .queue-stat-value { font-size: 24px; font-weight: 700; }
        .queue-stat-label { font-size: 12px; color: var(--gray); }
        .retry-btn { background: none; border: none; color: #1890ff; cursor: pointer; margin-left: 8px; }
        .retry-btn:hover { text-decoration: underline; }
        .zip-upload-area { border: 2px dashed var(--primary); background: rgba(24,144,255,0.05); }
        .preview-card { border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .preview-cover { width: 80px; height: 120px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="logo"><i class="fas fa-globe-americas"></i><span>Global Shorts 后台</span></div>
        </div>
        <div class="header-right">
            <div class="language-switcher" id="languageSwitcher">
                <i class="fas fa-language"></i><span id="currentLanguage">中文</span><i class="fas fa-chevron-down"></i>
            </div>
            <div class="admin-user" id="userMenuTrigger" style="position:relative; cursor:pointer;">
                <div class="user-avatar" id="userAvatar">AD</div>
                <div>
                    <div id="adminName">管理员</div>
                    <div style="font-size:12px;color:var(--gray)" id="adminRole">超级管理员</div>
                </div>
            </div>
        </div>
    </header>

    <div class="user-dropdown" id="userDropdown" style="display:none; position:absolute; top:60px; right:20px; background:white; border-radius:8px; box-shadow:0 8px 16px rgba(0,0,0,0.1); z-index:1000; min-width:180px;">
        <a href="/admin/profile.html"><i class="fas fa-user"></i>个人资料</a>
        <a href="/admin/settings.html"><i class="fas fa-cog"></i>账户设置</a>
        <a href="/admin/change-password.html"><i class="fas fa-key"></i>修改密码</a>
        <div class="dropdown-divider"></div>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>退出登录</a>
    </div>

    <div class="admin-container">
        <aside class="admin-sidebar" id="adminSidebar">...</aside>

        <main class="admin-main">
            <div class="page-header">
                <h1 class="page-title">自动化上架</h1>
                <p class="page-description">上传ZIP压缩包，自动解析剧集信息、封面、分集，一键创建并上传</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">📦 上传剧集压缩包</h3>
                </div>
                <div class="card-content">
                    <div class="upload-area zip-upload-area" id="zipUploadArea" style="text-align:center; padding:40px;">
                        <i class="fas fa-file-archive" style="font-size:48px; color:var(--primary);"></i>
                        <h3>拖放ZIP压缩包到这里</h3>
                        <p>支持 .zip 格式 | 自动解析剧集信息、封面、分集视频</p>
                        <button class="btn btn-primary" id="selectZipBtn"><i class="fas fa-folder-open"></i>选择ZIP文件</button>
                    </div>
                    <p style="color:var(--gray); margin-top:8px;">
                        <i class="fas fa-info-circle"></i> 
                        文件夹命名格式：<code>剧集名称_语言_分类.zip</code> 例如：<code>总裁的秘密婚姻_zh-CN_romance.zip</code>
                    </p>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">3. 上传队列</h3>
                    <div>
                        <span id="listCount">0</span> 个文件
                        <button class="btn btn-sm btn-secondary" id="retryAllBtn" style="margin-left:8px;">🔄 全部重试</button>
                        <button class="btn btn-sm btn-danger" id="clearListBtn">清空列表</button>
                    </div>
                </div>
                <div class="card-content">
                    <div class="queue-stats" id="queueStats" style="display:none;">
                        <div class="queue-stat"><span class="queue-stat-value" id="statTotal">0</span><span class="queue-stat-label">总数</span></div>
                        <div class="queue-stat"><span class="queue-stat-value" id="statPending">0</span><span class="queue-stat-label">等待中</span></div>
                        <div class="queue-stat"><span class="queue-stat-value" id="statUploading">0</span><span class="queue-stat-label">上传中</span></div>
                        <div class="queue-stat"><span class="queue-stat-value" id="statSuccess">0</span><span class="queue-stat-label">成功</span></div>
                        <div class="queue-stat"><span class="queue-stat-value" id="statFailed">0</span><span class="queue-stat-label">失败</span></div>
                    </div>

                    <div class="file-list" id="uploadList">
                        <div class="empty-placeholder" style="padding:40px;">请上传ZIP压缩包，系统会自动解析并添加上传队列</div>
                    </div>

                    <div id="uploadProgress" style="display:none; margin-top:20px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <span>整体进度</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar"><div class="progress-bar-fill" id="progressBar" style="width:0%;"></div></div>
                    </div>

                    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                        <div style="flex:1;">
                            <label><input type="checkbox" id="autoRetryCheckbox" checked> 失败自动重试</label>
                            <label style="margin-left:16px;"><input type="number" id="maxConcurrent" value="3" min="1" max="5" style="width:60px;"> 并行数</label>
                        </div>
                        <button class="btn btn-primary" id="startUploadBtn" disabled>🚀 开始上传</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="previewModal">
        <div class="modal" style="max-width:700px;">
            <div class="modal-header">
                <h3 class="modal-title">📋 确认剧集信息</h3>
                <button class="modal-close" id="closePreviewModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div id="previewContent"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelPreviewBtn">取消</button>
                <button class="btn btn-primary" id="confirmPreviewBtn">确认创建并上传</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="languageModal">...</div>

    <script src="js/admin-core.js"></script>
    <script>
    // ==================== 配置 ====================
    let uploadQueue = [];
    let isUploading = false;
    let activeUploads = 0;
    let languageList = [];
    let categoryList = [];
    let pendingZipData = null;

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login.html'; return; }

        await loadCategoryList();
        await loadLanguageList();

        const zipArea = document.getElementById('zipUploadArea');
        if (zipArea) {
            zipArea.addEventListener('dragover', (e) => { 
                e.preventDefault(); 
                zipArea.style.borderColor = 'var(--primary)'; 
            });
            zipArea.addEventListener('dragleave', () => { 
                zipArea.style.borderColor = 'var(--border)'; 
            });
            zipArea.addEventListener('drop', (e) => {
                e.preventDefault();
                zipArea.style.borderColor = 'var(--border)';
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].name.endsWith('.zip')) {
                    handleZipFile(files[0]);
                } else {
                    alert('请拖放 ZIP 压缩包文件（.zip）');
                }
            });
        }

        document.getElementById('selectZipBtn')?.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.zip';
            input.onchange = (e) => {
                if (e.target.files[0]) handleZipFile(e.target.files[0]);
            };
            input.click();
        });

        document.getElementById('clearListBtn').addEventListener('click', clearList);
        document.getElementById('startUploadBtn').addEventListener('click', startUpload);
        document.getElementById('retryAllBtn').addEventListener('click', retryAll);

        document.getElementById('closePreviewModal').addEventListener('click', () => {
            adminCore.closeModal('previewModal');
        });
        document.getElementById('cancelPreviewBtn').addEventListener('click', () => {
            adminCore.closeModal('previewModal');
        });
        document.getElementById('confirmPreviewBtn').addEventListener('click', confirmAndUpload);
    });

    async function loadCategoryList() {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`${window.API_BASE}/categories`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success && Array.isArray(data.data)) {
                categoryList = data.data;
            }
        } catch (error) { console.error('加载分类失败:', error); }
    }

    async function loadLanguageList() {
        try {
            const token = localStorage.getItem('token');
            const res = await fetch(`${window.API_BASE}/languages`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success && Array.isArray(data.data)) {
                languageList = data.data;
            }
        } catch (error) { console.error('加载语言失败:', error); }
    }

    async function handleZipFile(zipFile) {
        const JSZip = window.JSZip;
        if (!JSZip) {
            alert('JSZip 库加载中，请刷新页面重试');
            return;
        }

        try {
            const zip = await JSZip.loadAsync(zipFile);
            let folderName = zipFile.name.replace('.zip', '');
            console.log('解析ZIP:', zipFile.name, '文件夹名:', folderName);
            
            let dramaInfo = parseFolderName(folderName);
            let coverBlob = null;
            let videoFiles = [];
            
            for (const [path, file] of Object.entries(zip.files)) {
                if (file.dir) continue;
                const fileName = path.split('/').pop();
                const ext = fileName.split('.').pop().toLowerCase();
                
                if (fileName.match(/cover|poster|封面/i) && ['jpg', 'jpeg', 'png', 'webp'].includes(ext)) {
                    coverBlob = await file.async('blob');
                    dramaInfo.coverFile = new File([coverBlob], fileName, { type: `image/${ext}` });
                    console.log('找到封面:', fileName);
                }
                
                if (['mp4', 'm3u8', 'ts', 'avi', 'mov', 'mkv'].includes(ext)) {
                    const videoBlob = await file.async('blob');
                    videoFiles.push({
                        file: new File([videoBlob], fileName, { type: `video/${ext}` }),
                        name: fileName,
                        path: path
                    });
                    console.log('找到视频:', fileName);
                }
            }
            
            if (videoFiles.length === 0) {
                alert('ZIP文件中没有找到视频文件！');
                return;
            }
            
            showPreviewModal(dramaInfo, videoFiles, coverBlob);
        } catch (error) {
            console.error('解析ZIP失败:', error);
            alert('解析ZIP文件失败：' + error.message);
        }
    }

    function parseFolderName(folderName) {
        let match = folderName.match(/^(.+?)_([a-z]{2}-[A-Z]{2})_(.+)$/i);
        if (match) {
            return {
                title: match[1],
                language: match[2],
                category: match[3].toLowerCase(),
                coverFile: null,
                description: '',
                tags: ''
            };
        }
        match = folderName.match(/^(.+?)_([a-z]{2}-[A-Z]{2})$/i);
        if (match) {
            return {
                title: match[1],
                language: match[2],
                category: null,
                coverFile: null,
                description: '',
                tags: ''
            };
        }
        return {
            title: folderName,
            language: null,
            category: null,
            coverFile: null,
            description: '',
            tags: ''
        };
    }

    function showPreviewModal(dramaInfo, videoFiles, coverBlob) {
        let categoryOptions = '<option value="">请选择分类</option>';
        categoryList.forEach(cat => {
            const selected = (dramaInfo.category === cat.id) ? 'selected' : '';
            categoryOptions += `<option value="${cat.id}" ${selected}>${cat.name}</option>`;
        });
        
        let languageOptions = '';
        languageList.forEach(lang => {
            const selected = (dramaInfo.language === lang.code) ? 'selected' : '';
            languageOptions += `<option value="${lang.code}" ${selected}>${lang.name} (${lang.code})</option>`;
        });
        
        const coverHtml = coverBlob ? 
            `<img src="${URL.createObjectURL(coverBlob)}" style="width:100px; height:140px; object-fit:cover; border-radius:4px;">` :
            '<div style="width:100px; height:140px; background:var(--gray-light); display:flex; align-items:center; justify-content:center;"><i class="fas fa-image" style="font-size:32px; color:var(--gray);"></i></div>';
        
        const videoListHtml = videoFiles.map((vf, idx) => {
            const episodeNum = extractEpisodeNumber(vf.name);
            return `<div>${idx+1}. ${vf.name} → 第${episodeNum}集 (${(vf.file.size / 1024 / 1024).toFixed(2)} MB)</div>`;
        }).join('');
        
        document.getElementById('previewContent').innerHTML = `
            <div class="preview-card">
                <div style="display:flex; gap:20px;">
                    ${coverHtml}
                    <div style="flex:1;">
                        <div class="form-group">
                            <label>剧集名称</label>
                            <input type="text" class="form-control" id="previewTitle" value="${escapeHtml(dramaInfo.title)}">
                        </div>
                        <div class="form-group">
                            <label>主要语言</label>
                            <select class="form-control" id="previewLanguage">${languageOptions}</select>
                        </div>
                        <div class="form-group">
                            <label>分类</label>
                            <select class="form-control" id="previewCategory">${categoryOptions}</select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea class="form-control" id="previewDescription" rows="2">${escapeHtml(dramaInfo.description || '')}</textarea>
                </div>
                <div class="form-group">
                    <label>标签（逗号分隔）</label>
                    <input type="text" class="form-control" id="previewTags" value="${escapeHtml(dramaInfo.tags || '')}">
                </div>
            </div>
            <div class="preview-card">
                <h4>检测到的视频文件 (${videoFiles.length}个)</h4>
                <div style="max-height:200px; overflow:auto;">${videoListHtml}</div>
                <p style="margin-top:8px; font-size:12px; color:var(--gray);">
                    <i class="fas fa-info-circle"></i> 上传后R2存储格式：<code>01_第1集.mp4</code>、<code>02_第2集.mp4</code>
                </p>
            </div>
        `;
        
        pendingZipData = { dramaInfo, videoFiles, coverBlob };
        adminCore.openModal('previewModal');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function extractEpisodeNumber(fileName) {
        let match = fileName.match(/^(\d+)[_\-\s]/);
        if (match) return parseInt(match[1], 10);
        match = fileName.match(/(\d+)(?=\.[^.]+$)/);
        if (match) return parseInt(match[1], 10);
        match = fileName.match(/第(\d+)集/);
        if (match) return parseInt(match[1], 10);
        match = fileName.match(/\d+/);
        if (match) return parseInt(match[0], 10);
        return null;
    }

    async function confirmAndUpload() {
        if (!pendingZipData) return;
        
        const { videoFiles, coverBlob } = pendingZipData;
        const token = localStorage.getItem('token');
        
        const title = document.getElementById('previewTitle').value;
        const language = document.getElementById('previewLanguage').value;
        const category = document.getElementById('previewCategory').value;
        const description = document.getElementById('previewDescription').value;
        const tags = document.getElementById('previewTags').value;
        
        if (!title) { alert('请输入剧集名称'); return; }
        if (!language) { alert('请选择主要语言'); return; }
        if (!category) { alert('请选择分类'); return; }
        
        adminCore.closeModal('previewModal');
        
        let coverUrl = '';
        if (coverBlob) {
    const formData = new FormData();
    formData.append('file', coverBlob, coverBlob.name || 'cover.jpg');
    
    try {
        console.log('上传封面:', coverBlob.name, coverBlob.type, coverBlob.size);
        const uploadRes = await fetch(`${window.UPLOAD_BASE}/image`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        
        if (!uploadRes.ok) {
            const errorText = await uploadRes.text();
            console.error('封面上传失败:', uploadRes.status, errorText);
            throw new Error(`上传失败: ${uploadRes.status}`);
        }
        
        const uploadData = await uploadRes.json();
        if (uploadData.success) coverUrl = uploadData.url;
    } catch (error) {
        console.error('封面上传失败:', error);
        // 继续执行，只是没有封面
        alert('封面上传失败，将继续创建剧集');
    }
}
        
        let dramaId = null;
        try {
            const dramaData = { title, language, category, cover_url: coverUrl, description, tags, status: 'published' };
            const dramaRes = await fetch(`${window.API_BASE}/dramas`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(dramaData)
            });
            const dramaResult = await dramaRes.json();
            if (!dramaResult.success) throw new Error(dramaResult.error || '创建剧集失败');
            dramaId = dramaResult.id;
            alert(`✅ 剧集 "${title}" 创建成功！`);
        } catch (error) {
            alert('创建剧集失败：' + error.message);
            return;
        }
        
        for (const videoFile of videoFiles) {
            const episodeNum = extractEpisodeNumber(videoFile.name);
            if (!episodeNum) {
                console.error(`无法解析集数: ${videoFile.name}`);
                continue;
            }
            
            const ext = videoFile.name.split('.').pop().toLowerCase();
            uploadQueue.push({
                id: crypto.randomUUID(),
                type: 'file',
                file: videoFile.file,
                episode: episodeNum,
                title: `第${episodeNum}集`,
                format: ext === 'm3u8' ? 'm3u8' : ext,
                size: videoFile.file.size,
                status: 'pending',
                retryCount: 0,
                error: null,
                dramaId: dramaId
            });
        }
        
        uploadQueue.sort((a, b) => a.episode - b.episode);
        renderUploadList();
        updateUploadButton();
        if (uploadQueue.length > 0) startUpload();
    }

    function renderUploadList() {
        const container = document.getElementById('uploadList');
        const countSpan = document.getElementById('listCount');

        if (uploadQueue.length === 0) {
            container.innerHTML = '<div class="empty-placeholder" style="padding:40px;">请上传ZIP压缩包，系统会自动解析并添加上传队列</div>';
            countSpan.textContent = '0';
            document.getElementById('queueStats').style.display = 'none';
            return;
        }

        const stats = getQueueStats();
        document.getElementById('statTotal').textContent = stats.total;
        document.getElementById('statPending').textContent = stats.pending;
        document.getElementById('statUploading').textContent = stats.uploading;
        document.getElementById('statSuccess').textContent = stats.success;
        document.getElementById('statFailed').textContent = stats.failed;
        document.getElementById('queueStats').style.display = 'flex';
        countSpan.textContent = stats.total;

        container.innerHTML = '';
        uploadQueue.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.dataset.id = item.id;
            
            let statusClass = '', statusText = '';
            switch(item.status) {
                case 'pending': statusClass = 'status-pending'; statusText = '⏳ 等待中'; break;
                case 'uploading': statusClass = 'status-uploading'; statusText = '📤 上传中...'; break;
                case 'success': statusClass = 'status-success'; statusText = '✅ 成功'; break;
                case 'failed': statusClass = 'status-failed'; statusText = `❌ 失败${item.error ? ': ' + item.error : ''}`; break;
                default: statusClass = 'status-pending'; statusText = '⏳ 等待中';
            }
            
            let iconClass = 'fas fa-file-video';
            if (item.format === 'm3u8') iconClass = 'fas fa-play-circle';

            div.innerHTML = `
                <div class="file-info">
                    <i class="${iconClass} file-icon"></i>
                    <div>
                        <div><strong>第${item.episode}集</strong> - ${item.title}</div>
                        <div style="font-size:12px; color:var(--gray);">${item.file.name}</div>
                        <div style="font-size:11px; color:var(--success);">→ R2: ${item.episode.toString().padStart(2, '0')}_第${item.episode}集.${item.format}</div>
                    </div>
                </div>
                <div class="file-meta">
                    <span><i class="fas fa-tag"></i> ${item.format}</span>
                    <span>${(item.size / 1024 / 1024).toFixed(2)} MB</span>
                    <span class="upload-status ${statusClass}">${statusText}</span>
                </div>
                <div class="file-actions">
                    ${item.status === 'failed' ? `<button class="retry-btn" onclick="retryItem('${item.id}')">🔄 重试</button>` : ''}
                    <button class="btn btn-sm btn-danger" onclick="removeQueueItem('${item.id}')"><i class="fas fa-trash"></i></button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function getQueueStats() {
        return {
            total: uploadQueue.length,
            pending: uploadQueue.filter(i => i.status === 'pending').length,
            uploading: uploadQueue.filter(i => i.status === 'uploading').length,
            success: uploadQueue.filter(i => i.status === 'success').length,
            failed: uploadQueue.filter(i => i.status === 'failed').length
        };
    }

    window.removeQueueItem = function(id) {
        uploadQueue = uploadQueue.filter(item => item.id !== id);
        renderUploadList();
        updateUploadButton();
    };

    window.retryItem = function(id) {
        const item = uploadQueue.find(i => i.id === id);
        if (item && item.status === 'failed') {
            item.status = 'pending';
            item.error = null;
            renderUploadList();
            if (isUploading) processQueue();
        }
    };

    function retryAll() {
        uploadQueue.forEach(item => {
            if (item.status === 'failed') {
                item.status = 'pending';
                item.error = null;
            }
        });
        renderUploadList();
        if (isUploading) processQueue();
    }

    function clearList() {
        const pendingItems = uploadQueue.filter(i => i.status !== 'success');
        if (pendingItems.length > 0 && !confirm('确定清空所有未成功的项目吗？')) return;
        uploadQueue = uploadQueue.filter(i => i.status === 'success');
        renderUploadList();
        updateUploadButton();
    }

    function updateUploadButton() {
        const btn = document.getElementById('startUploadBtn');
        const hasPending = uploadQueue.some(i => i.status === 'pending' || i.status === 'failed');
        btn.disabled = !(hasPending && !isUploading);
    }

    async function startUpload() {
        if (isUploading) return;
        
        isUploading = true;
        const startBtn = document.getElementById('startUploadBtn');
        startBtn.disabled = true;
        startBtn.textContent = '上传中...';
        document.getElementById('uploadProgress').style.display = 'block';

        const maxConcurrent = parseInt(document.getElementById('maxConcurrent').value) || 3;
        const autoRetry = document.getElementById('autoRetryCheckbox').checked;
        const token = localStorage.getItem('token');

        uploadQueue.forEach(item => {
            if (item.status === 'failed' && autoRetry) {
                item.status = 'pending';
                item.error = null;
            }
        });
        renderUploadList();

        const processQueue = async () => {
            const pendingItems = uploadQueue.filter(i => i.status === 'pending');
            if (pendingItems.length === 0 && activeUploads === 0) {
                const stats = getQueueStats();
                isUploading = false;
                startBtn.disabled = false;
                startBtn.textContent = '🚀 开始上传';
                if (stats.failed === 0) {
                    alert(`🎉 全部上传完成！共 ${stats.success} 个分集`);
                    uploadQueue = [];
                    renderUploadList();
                } else {
                    alert(`上传完成！成功: ${stats.success}, 失败: ${stats.failed}`);
                }
                updateUploadButton();
                return;
            }
            
            while (activeUploads < maxConcurrent && uploadQueue.some(i => i.status === 'pending')) {
                const nextItem = uploadQueue.find(i => i.status === 'pending');
                if (!nextItem) break;
                activeUploads++;
                uploadSingle(nextItem, token, autoRetry).finally(() => {
                    activeUploads--;
                    processQueue();
                });
            }
        };

        const uploadSingle = async (item, token, autoRetry) => {
            item.status = 'uploading';
            renderUploadList();
            updateOverallProgress();
            
            try {
                const formData = new FormData();
                formData.append('file', item.file);
                formData.append('type', 'video');
                
                const ext = item.file.name.split('.').pop();
                // ✅ 统一 R2 存储格式：01_第1集.mp4
                const filename = `dramas/${item.dramaId}/${item.episode.toString().padStart(2, '0')}_第${item.episode}集.${ext}`;
                
                const uploadRes = await fetch(`${window.UPLOAD_BASE}/video?path=${encodeURIComponent(filename)}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                if (!uploadRes.ok) throw new Error(`HTTP ${uploadRes.status}`);
                const uploadData = await uploadRes.json();
                if (!uploadData.success) throw new Error(uploadData.error || '上传失败');
                const videoUrl = uploadData.url;
                
                let dramaLanguage = 'en-US';
                const dramaRes = await fetch(`${window.API_BASE}/dramas/${item.dramaId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const dramaData = await dramaRes.json();
                if (dramaData.success && dramaData.data) {
                    dramaLanguage = dramaData.data.language || 'en-US';
                }
                
                const episodeData = {
                    drama_id: item.dramaId,
                    episode_number: item.episode,
                    title: `第${item.episode}集`,
                    video_url: videoUrl,
                    duration: 0,
                    status: 'published',
                    language: dramaLanguage
                };
                
                const episodeRes = await fetch(`${window.API_BASE}/episodes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(episodeData)
                });
                
                if (!episodeRes.ok) throw new Error(`HTTP ${episodeRes.status}`);
                const episodeResult = await episodeRes.json();
                if (!episodeResult.success) throw new Error(episodeResult.error || '创建分集失败');
                
                item.status = 'success';
                item.error = null;
                console.log(`✅ 第${item.episode}集上传成功: ${filename}`);
            } catch (error) {
                console.error('上传失败:', error);
                item.status = 'failed';
                item.error = error.message;
                if (autoRetry && item.retryCount < 3) {
                    item.retryCount++;
                    item.status = 'pending';
                    item.error = null;
                    console.log(`🔄 重试第 ${item.retryCount} 次: 第${item.episode}集`);
                }
            }
            
            renderUploadList();
            updateOverallProgress();
        };

        function updateOverallProgress() {
            const stats = getQueueStats();
            const total = stats.total;
            const completed = stats.success + stats.failed;
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
        }

        processQueue();
    }
    </script>
</body>
</html>
