<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - Global Shorts 后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin-common.css">
    <!-- 引入 Chart.js 用于绘制图表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--light);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .stat-icon.users { background: linear-gradient(135deg, #1890ff, #096dd9); }
        .stat-icon.dramas { background: linear-gradient(135deg, #52c41a, #389e0d); }
        .stat-icon.episodes { background: linear-gradient(135deg, #faad14, #d48806); }
        .stat-icon.revenue { background: linear-gradient(135deg, #f5222d, #cf1322); }
        .stat-info h3 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .stat-info p { color: var(--gray); }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="admin-header">
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="logo">
                <i class="fas fa-globe-americas"></i>
                <span>Global Shorts 后台</span>
            </div>
        </div>
        <div class="header-right">
            <div class="language-switcher" id="languageSwitcher">
                <i class="fas fa-language"></i>
                <span id="currentLanguage">中文</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="admin-user" id="userMenuTrigger" style="position:relative; cursor:pointer;">
                <div class="user-avatar" id="userAvatar">AD</div>
                <div>
                    <div id="adminName">管理员</div>
                    <div style="font-size:12px;color:var(--gray)" id="adminRole">超级管理员</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 用户下拉菜单 -->
    <div class="user-dropdown" id="userDropdown" style="display:none; position:absolute; top:60px; right:20px; background:white; border-radius:8px; box-shadow:0 8px 16px rgba(0,0,0,0.1); z-index:1000; min-width:180px;">
        <a href="/admin/profile.html"><i class="fas fa-user"></i>个人资料</a>
        <a href="/admin/settings.html"><i class="fas fa-cog"></i>账户设置</a>
        <a href="/admin/change-password.html"><i class="fas fa-key"></i>修改密码</a>
        <div style="height:1px; background:var(--border); margin:4px 0;"></div>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>退出登录</a>
    </div>

    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-menu">
                <a href="/admin/dashboard.html" class="menu-item">
                    <i class="fas fa-tachometer-alt"></i><span>仪表盘</span>
                </a>
                
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-user-menu" class="submenu-toggle">
                    <label for="toggle-user-menu">
                        <i class="fas fa-users"></i>
                        <span>用户管理</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </label>
                    <div class="submenu">
                        <a href="/admin/users.html" class="submenu-item">用户列表</a>
                        <a href="/admin/vip-users.html" class="submenu-item">VIP用户</a>
                        <a href="/admin/user-analysis.html" class="submenu-item">用户分析</a>
                    </div>
                </div>
                
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-content-menu" class="submenu-toggle">
                    <label for="toggle-content-menu">
                        <i class="fas fa-film"></i>
                        <span>内容管理</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </label>
                    <div class="submenu">
                        <a href="/admin/dramas.html" class="submenu-item">剧集管理</a>
                        <a href="/admin/episodes.html" class="submenu-item">分集管理</a>
                        <a href="/admin/batch-upload.html" class="submenu-item">批量上传</a>
                        <a href="/admin/categories.html" class="submenu-item">分类管理</a>
                    </div>
                </div>
                
                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-operation-menu" class="submenu-toggle">
                    <label for="toggle-operation-menu">
                        <i class="fas fa-chart-line"></i>
                        <span>运营分析</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </label>
                    <div class="submenu">
                        <a href="/admin/revenue.html" class="submenu-item">收入分析</a>
                        <a href="/admin/region-analysis.html" class="submenu-item">地区分析</a>
                        <a href="/admin/content-performance.html" class="submenu-item">内容表现</a>
                    </div>
                </div>

                <div class="menu-item has-submenu">
                    <input type="checkbox" id="toggle-system-menu" class="submenu-toggle">
                    <label for="toggle-system-menu">
                        <i class="fas fa-cog"></i>
                        <span>系统管理</span>
                        <i class="fas fa-chevron-down arrow"></i>
                    </label>
                    <div class="submenu">
                        <a href="/admin/admin-manage.html" class="submenu-item">管理员管理</a>
                        <a href="/admin/region-language.html" class="submenu-item">区域语言</a>
                        <a href="/admin/payment-interface.html" class="submenu-item">支付接口</a>
                        <a href="/admin/vip-plans.html" class="submenu-item">VIP套餐</a>
                        <a href="/admin/coin-packages.html" class="submenu-item">金币套餐</a>
                        <a href="/admin/ad-positions.html" class="submenu-item">广告位管理</a>
                        <a href="/admin/system-settings.html" class="submenu-item">系统设置</a>
                        <a href="/admin/frontend-manage.html" class="submenu-item">前台管理</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-main">
            <div class="page-header">
                <h1 class="page-title">仪表盘</h1>
                <p class="page-description">系统概览和关键指标</p>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon users"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3 id="totalUsers">0</h3>
                        <p>总用户数</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon dramas"><i class="fas fa-film"></i></div>
                    <div class="stat-info">
                        <h3 id="totalDramas">0</h3>
                        <p>总剧集数</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon episodes"><i class="fas fa-list-ol"></i></div>
                    <div class="stat-info">
                        <h3 id="totalEpisodes">0</h3>
                        <p>总分集数</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon revenue"><i class="fas fa-dollar-sign"></i></div>
                    <div class="stat-info">
                        <h3 id="monthlyRevenue">$0</h3>
                        <p>本月收入</p>
                    </div>
                </div>
            </div>

            <!-- 用户增长趋势图表 -->
            <div class="chart-container">
                <h3 class="chart-title">用户增长趋势（近30天）</h3>
                <div style="height:300px; position:relative;">
                    <canvas id="userGrowthChart"></canvas>
                </div>
            </div>

            <!-- 最近活动表格 -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">最近活动</h3>
                </div>
                <div class="card-content">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>用户</th>
                                <th>操作</th>
                                <th>时间</th>
                                <th>IP地址</th>
                            </tr>
                        </thead>
                        <tbody id="recentActivityBody">
                            <tr><td colspan="4" class="empty-placeholder">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- 语言选择模态框 -->
    <div class="modal-overlay" id="languageModal">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h3 class="modal-title">选择语言</h3>
                <button class="modal-close" id="closeLanguageModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="language-option active" data-lang="zh"><i class="fas fa-check"></i> 中文</div>
                <div class="language-option" data-lang="en">English</div>
            </div>
        </div>
    </div>

    <script src="js/admin-core.js"></script>
    <script>
        let growthChart = null;

        // 加载统计数据
        async function loadDashboardStats() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '/login.html';
                    return;
                }

                // 修改：使用 window.API_BASE 替换硬编码路径
                const response = await fetch(`${window.API_BASE}/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalUsers').textContent = data.data.users || 0;
                    document.getElementById('totalDramas').textContent = data.data.dramas || 0;
                    document.getElementById('totalEpisodes').textContent = data.data.episodes || 0;
                    document.getElementById('monthlyRevenue').textContent = `$${data.data.monthRevenue || 0}`;
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        // 加载用户增长趋势
        async function loadUserGrowth() {
            try {
                const token = localStorage.getItem('token');
                // 修改：使用 window.API_BASE 替换硬编码路径
                const response = await fetch(`${window.API_BASE}/user-growth?days=30`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    // 提取日期和数量
                    const labels = data.data.map(item => item.date);
                    const counts = data.data.map(item => item.count);
                    
                    // 如果已有图表实例，销毁后重新创建
                    if (growthChart) {
                        growthChart.destroy();
                    }
                    
                    const ctx = document.getElementById('userGrowthChart').getContext('2d');
                    growthChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: '新增用户数',
                                data: counts,
                                borderColor: '#1890ff',
                                backgroundColor: 'rgba(24,144,255,0.1)',
                                tension: 0.3,
                                fill: true,
                                pointBackgroundColor: '#1890ff',
                                pointBorderColor: '#fff',
                                pointRadius: 4,
                                pointHoverRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'top',
                                },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return `${context.dataset.label}: ${context.raw} 人`;
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: '用户数'
                                    }
                                },
                                x: {
                                    title: {
                                        display: true,
                                        text: '日期'
                                    },
                                    ticks: {
                                        maxRotation: 45,
                                        minRotation: 45
                                    }
                                }
                            }
                        }
                    });
                } else {
                    // 无数据显示占位
                    const ctx = document.getElementById('userGrowthChart').getContext('2d');
                    if (growthChart) growthChart.destroy();
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['暂无数据'],
                            datasets: [{ label: '新增用户数', data: [0] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false }
                    });
                }
            } catch (error) {
                console.error('加载用户增长失败:', error);
                const ctx = document.getElementById('userGrowthChart').getContext('2d');
                if (growthChart) growthChart.destroy();
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['加载失败'], datasets: [{ label: '新增用户数', data: [0] }] },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
        }

        // 加载最近活动
        async function loadRecentActivities() {
            try {
                const token = localStorage.getItem('token');
                // 修改：使用 window.API_BASE 替换硬编码路径
                const response = await fetch(`${window.API_BASE}/activities?limit=10`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                const tbody = document.getElementById('recentActivityBody');
                
                if (data.success && data.data && data.data.length > 0) {
                    tbody.innerHTML = '';
                    data.data.forEach(activity => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${activity.user || activity.username || '-'}</td>
                            <td>${activity.action || '-'}</td>
                            <td>${activity.time || activity.created_at || '-'}</td>
                            <td>${activity.ip || '-'}</td>
                        `;
                        tbody.appendChild(row);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-placeholder">暂无活动数据</td></tr>';
                }
            } catch (error) {
                console.error('加载活动失败:', error);
                document.getElementById('recentActivityBody').innerHTML = '<tr><td colspan="4" class="empty-placeholder">加载失败</td></tr>';
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            loadDashboardStats();
            loadUserGrowth();
            loadRecentActivities();
        });
    </script>
</body>
</html>
